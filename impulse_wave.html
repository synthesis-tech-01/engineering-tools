<script type="py">
import numpy as np
from scipy.optimize import curve_fit
from numpy.fft import fft, fftfreq, ifft
from pyscript import window, document, when
import io
import json

status_el = document.getElementById("status")
file_info_el = document.getElementById("file-info")

def update_status(text, animated=False):
    status_el.innerText = text
    if animated: status_el.classList.add("dot-ani")
    else: status_el.classList.remove("dot-ani")

def v_model(t_us, vpeak, b, shift, a):
    t = np.where(t_us <= 1e-4, 1e-4, t_us)
    return vpeak * np.exp(-t / b) - shift * np.exp(-t / a)

def to_js(obj):
    return window.JSON.parse(json.dumps(obj))

def safe_list(arr):
    return np.nan_to_num(arr, nan=0.0).tolist()

@when("change", "#file-upload")
async def handle_file(event):
    files = event.target.files
    if not files: return
    f = files.item(0)
    file_info_el.innerText = f"選択ファイル: {f.name}"
    update_status("Analyzing...", animated=True)
    
    js_log = window.console.log
    
    try:
# --- 1. ファイルの全行読み込み ---
        array_buffer = await f.arrayBuffer()
        raw_bytes = array_buffer.to_bytes()
        text_data = raw_bytes.decode('utf-8', errors='ignore')
        lines = text_data.splitlines()
        
        # 判定用フラグの初期化
        s_rate = h_res = h_off = None
        
        # --- 2. 最初の20行で「横河の物理定義」が含まれているかだけをチェック ---
        for line in lines[:20]:
            parts = [p.strip().replace('"', '') for p in line.split(',')]
            if len(parts) >= 2:
                key, val = parts[0], parts[1]
                if "SampleRate" in key:
                    try: s_rate = float(val)
                    except: pass
                elif "HResolution" in key:
                    try: h_res = float(val)
                    except: pass
                elif "HOffset" in key:
                    try: h_off = float(val)
                    except: pass

        # --- 3. メイン分岐ロジック ---
        # 横河の3つの物理定数が完全に揃った場合のみ、横河専用の固定行読み込みを実行
        if all(v is not None for v in [s_rate, h_res, h_off]):
            js_log("Yokogawa DL format recognized. Using fixed-line extraction.")
            v_raw_list = []
            # 18行目以降、横河特有の「,電圧」形式を抽出
            for data_line in lines[17:]:
                d_parts = data_line.split(',')
                if len(d_parts) >= 2 and d_parts[1].strip():
                    try: v_raw_list.append(float(d_parts[1].strip()))
                    except: continue
            
            v_raw_orig = np.array(v_raw_list)
            dt_sec = h_res if h_res > 0 else (1.0 / s_rate)
            time_col = h_off + np.arange(len(v_raw_orig)) * dt_sec

        else:
            # 【重要】ここが「以前読み込めていた」すべての形式を救う、元のロジックです
            # 欧州メーカー、岩通、テクトロ、その他の汎用CSVはすべてこちらを通ります
            js_log("Generic/Legacy CSV format recognized. Using exhaustive scan.")
            processed_values = []
            for line in lines:
                # 従来の万能型区切り文字処理
                parts = line.replace(',', ' ').replace('\t', ' ').replace('"', ' ').split()
                nums = []
                for p in parts:
                    try:
                        nums.append(float(p))
                    except ValueError:
                        continue
                if nums:
                    processed_values.append(nums)

            if not processed_values:
                raise ValueError("数値データが見つかりません。")

            # これまでの列構成判断ロジックを100%維持
            max_cols = max(len(row) for row in processed_values)
            if max_cols >= 2:
                # 2列以上あれば [0]:時間, [1]:電圧 とみなす
                time_col = np.array([r[0] for r in processed_values if len(r) >= 2])
                v_raw_orig = np.array([r[1] for r in processed_values if len(r) >= 2])
                dt_sec = (time_col[-1] - time_col[0]) / (len(time_col) - 1) if len(time_col) > 1 else 0
            else:
                # 1列のみであれば電圧のみとみなし、推測ロジックを適用
                v_raw_orig = np.array([r[0] for r in processed_values])
                # メタデータ(XINCR等)があれば使い、なければデータ点数から推測
                dt_sec = float(meta.get("XINCR", 0.0))
                if dt_sec == 0:
                    dt_sec = 4e-8 if len(v_raw_orig) < 50000 else 8.333333e-9
                time_col = np.arange(len(v_raw_orig)) * dt_sec

        # --- 4. 共通の物理量確定 ---
        dt_us = dt_sec * 1e6
        fs_mhz = 1.0 / dt_us if dt_us > 0 else 0
        
        try:
            ratio_val = float(document.getElementById("ratioInput").value or 1.0)
        except: ratio_val = 1.0
        v_raw_v = v_raw_orig * ratio_val





    

        # --- 3. 仮想ゼロ点(T0)特定 ---
        abs_v_raw = np.abs(v_raw_v)
        v_max_raw = np.max(abs_v_raw)
        idx_start = np.where(abs_v_raw > v_max_raw * 0.05)[0][0]
        t_us = (np.arange(len(v_raw_v)) - idx_start) * dt_us

        # --- 4. Fitting ---
        t_max_idx = np.argmax(abs_v_raw)
        actual_polarity = 1.0 if v_raw_v[t_max_idx] >= 0 else -1.0
        fit_mask = t_us >= 0
        p0 = [v_max_raw * 2.0, 5.0, v_max_raw * 1.8, 0.5]
        
        popt, _ = curve_fit(v_model, t_us[fit_mask], abs_v_raw[fit_mask], p0=p0, maxfev=10000)
        v_fit_v = np.zeros_like(v_raw_v)
        v_fit_v[fit_mask] = v_model(t_us[fit_mask], *popt) * actual_polarity
        residual_v = v_raw_v - v_fit_v

        # --- 5. FFT & Filter (サンプリング周期 dt_sec に完全追従) ---
        n = len(v_raw_v)
        yf = fft(residual_v - np.mean(residual_v))
        xf = fftfreq(n, dt_sec)
        k_factor = 1.0 / (1.0 + 2.2 * (xf/1e6)**2)
        v_filtered_total = v_fit_v + ifft(yf * k_factor).real
    
        # --- 6. T1, T2 精密計測 ---
        abs_v_filt = np.abs(v_filtered_total)
        pk_idx = np.argmax(abs_v_filt)
        v_pk = v_filtered_total[pk_idx]
        
        idx_30 = np.interp(abs_v_filt[pk_idx]*0.3, abs_v_filt[:pk_idx], np.arange(pk_idx))
        idx_90 = np.interp(abs_v_filt[pk_idx]*0.9, abs_v_filt[:pk_idx], np.arange(pk_idx))
        idx_50 = np.interp(abs_v_filt[pk_idx]*0.5, abs_v_filt[pk_idx:][::-1], np.arange(n-1, pk_idx-1, -1))
        
        # 物理計算 T1 = ((idx90 - idx30) * dt_us) / 0.6
        res_t1 = ((idx_90 - idx_30) * dt_us) / 0.6
        t_30_us = (idx_30 - idx_start) * dt_us
        res_t0 = t_30_us - (0.3 * res_t1)
        t_50_us = (idx_50 - idx_start) * dt_us
        res_t2 = t_50_us - res_t0

        # --- 7. Plotly表示 (Residual含む) ---
        main_traces = [
            {"x": safe_list(t_us), "y": safe_list(v_raw_v/1000), "name": "Raw", "line": {"color": "#3498db", "width": 1}},
            {"x": safe_list(t_us), "y": safe_list(v_filtered_total/1000), "name": "Filtered", "line": {"color": "#2ecc71", "width": 3}},
            {"x": safe_list(t_us), "y": safe_list(residual_v/10000), "name": "Residual", "line": {"color": "gray", "width": 1}},
            {"x": [res_t0, t_30_us, (idx_90-idx_start)*dt_us, t_50_us, res_t0 + res_t1, t_50_us], "y": [0, (v_pk*0.3)/1000, (v_pk*0.9)/1000, (v_pk*0.5)/1000, 0, 0], "mode": "markers", "marker": {"color": "red", "size": 8}, "name": "Points"}
        ]
        
        main_layout = {
            "template": "plotly_white", "height": 600,
            "xaxis": {"title": "Time [us]","zeroline": False},         
            "yaxis": {"title": "Voltage [kV]", "automargin": True,"zeroline": False},
            "shapes": [
                {"type": "line", "x0": res_t0, "y0": 0, "x1": res_t0 + res_t1, "y1": v_pk/1000, "line": {"color": "red", "dash": "dashdot", "width": 1}},
    {"type": "line", "x0": res_t0 + res_t1, "y0": v_pk/1000, "x1": res_t0 + res_t1, "y1": 0, "line": {"color": "red", "dash": "dashdot", "width": 1}},
                {"type": "line", "x0": t_50_us, "y0": (v_pk*0.5)/1000, "x1": res_t0, "y1": (v_pk*0.5)/1000, "line": {"color": "gray", "dash": "dash", "width": 1}},
                {"type": "line", "x0": t_50_us, "y0": (v_pk*0.5)/1000, "x1": t_50_us, "y1": 0, "line": {"color": "gray", "dash": "dash", "width": 1}}
            ],
            "showlegend": True
        }
        window.Plotly.newPlot("plot-main", to_js(main_traces), to_js(main_layout))
        
        # --- 8. JS FFT 呼び出し ---
        mask_fft = xf > 0
        window.plotFFTInJS(to_js((xf[mask_fft]/1e6).tolist()), to_js((np.abs(yf[mask_fft])*2/n).tolist()), to_js((np.abs(yf[mask_fft]*k_factor[mask_fft])*2/n).tolist()), 10.0)

        # --- 9. ステータス更新 ---
        status_text = (
            f"Completed: Voltage={v_pk/1000:.2f}kV  T1={res_t1:.2f}us  T2={res_t2:.2f}us\n"
            f"Sampling Rate: {fs_mhz:.1f}MHz | Fit: a={popt[3]:.3f}, b={popt[1]:.3f}, shift={popt[2]:.1f}, "
        )
        update_status(status_text)
        js_log(f"Debug [idx_30:{idx_30:.2f} idx_90:{idx_90:.2f} dt_us:{dt_us:.6f} res_t1:{res_t1:.4f}]")

    except Exception as e:
        update_status(f"Error: {str(e)}")
        js_log(f"Error Trace: {str(e)}")

# UI初期表示
document.getElementById("ui-area").style.display = "block"
if hasattr(window, "initTimerInterval"): window.clearInterval(window.initTimerInterval)
update_status(f"READY (Initial Load: {document.getElementById('init-timer').innerText}s)")
</script>




    
<script>


    
function plotFFTInJS(freq, rawAmp, filteredAmp, f_limit) {
    // 1. Rawデータのトレース定義 (緑)
    const traceRaw = {
        x: freq,
        y: rawAmp,
        name: 'Raw',
        type: 'scatter',
        mode: 'lines',
        line: { color: '#3498db', width: 1 }
    };

    // 2. Filteredデータのトレース定義 (青)
    const traceFiltered = {
        x: freq,
        y: filteredAmp,
        name: 'Filtered',
        type: 'scatter',
        mode: 'lines',
        line: { color: '#2ecc71', width: 3 }
    };

    // 3. レイアウト設定（横幅最大化 & 凡例内包）
    const layout = {
        template: 'plotly_white',
        margin: { t: 30, r: 20, b: 50, l: 60 },
        autosize: true,
        xaxis: { 
            title: 'Frequency [MHz]', 
            range: [0, 10], // 10MHzに固定
            autorange: false 
        },
        yaxis: { 
            title: 'Amplitude', 
            autorange: true 
        },
        showlegend: true,
        legend: {
            x: 0.99,
            y: 0.99,
            xanchor: 'right',
            yanchor: 'top',
            bgcolor: 'rgba(255, 255, 255, 0.6)',
            bordercolor: '#ccc',
            borderwidth: 1
        }
    };

    const config = { responsive: true };

    // 4. 描画実行（traceRaw と traceFiltered を配列で渡す）
    // もしここで 'traceRaw is not defined' が出る場合は、上の定義より前にこの行を書いていないか確認してください
    Plotly.newPlot('plot-fft', [traceRaw, traceFiltered], layout, config);
}

// 1. グローバルな変数を用意する（windowに紐付ける）
    window.initTimerInterval = null;

    (function() {
        const startTime = performance.now();
        const timerEl = document.getElementById("init-timer");
        
        // 2. 変数にインターバルのIDを代入する
        // これにより、後から Python側で window.initTimerInterval を参照して停止できます
        window.initTimerInterval = setInterval(() => {
            const elapsed = (performance.now() - startTime) / 1000;
            timerEl.innerText = elapsed.toFixed(1);
        }, 100);
    })();

    const mailtoUrl = `mailto:synthesis.nd1@gmail.com?subject=${subject}&body=${encodeURIComponent(bodyText)}`;

}
