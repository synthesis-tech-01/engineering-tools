<script type="py">
import pandas as pd
import numpy as np
from scipy.optimize import curve_fit
from scipy.fft import fft, fftfreq
from pyscript import window, document, when
import io
import json

status_el = document.getElementById("status")
file_info_el = document.getElementById("file-info")

def update_status(text, animated=False):
    status_el.innerText = text
    if animated: status_el.classList.add("dot-ani")
    else: status_el.classList.remove("dot-ani")

def v_model(t_us, vpeak, b, shift, a):
    t = np.where(t_us <= 1e-4, 1e-4, t_us)
    return vpeak * np.exp(-b / t) - shift * np.exp(-a / t)

def to_js(obj):
    return window.JSON.parse(json.dumps(obj))

def safe_list(arr):
    return np.nan_to_num(arr, nan=0.0).tolist()

@when("change", "#file-upload")
async def handle_file(event):
    files = event.target.files
    if not files: return
    f = files.item(0)
    file_info_el.innerText = f"選択ファイル: {f.name}"
    update_status("Analyzing...", animated=True)
    
    popt = [0.0, 0.0, 0.0, 0.0]
    
    try:
        buf = await f.arrayBuffer()
        df = pd.read_csv(io.BytesIO(buf.to_bytes()), sep=r'\s+|,', engine='python')
        df_clean = df.iloc[:, [0, 1]].apply(pd.to_numeric, errors='coerce').dropna().astype(np.float64)
        
        t_seconds = df_clean.iloc[:, 0].values
        v_raw_v = df_clean.iloc[:, 1].values
        n = len(t_seconds)
        dt_sec = (t_seconds[-1] - t_seconds[0]) / (n - 1) if n > 1 else 1e-9
        t_us = t_seconds * 1e6

        # --- 1. Fitting ---
        v_abs_data = np.abs(v_raw_v)
        v_max_abs = np.max(v_abs_data)
        t_max_idx = np.argmax(v_abs_data)
        actual_polarity = 1.0 if v_raw_v[t_max_idx] >= 0 else -1.0

        p0 = [v_max_abs * 2.0, 5.0, v_max_abs * 1.8, 0.5]
        try:
            popt, _ = curve_fit(v_model, t_us, v_abs_data, p0=p0, maxfev=10000)
            v_fit_v = v_model(t_us, *popt) * actual_polarity
            residual_v = v_raw_v - v_fit_v
        except:
            v_fit_v = np.zeros_like(v_raw_v)
            residual_v = v_raw_v

        # --- 2. FFT & Filter (IEC規格 1e+6) ---
        detrended_res = residual_v - np.mean(residual_v)
        yf = fft(detrended_res)
        xf = fftfreq(n, dt_sec)
        f_mhz = xf / 1e6
        k_factor = 1.0 / (1.0 + 2.2 * f_mhz**2)
        yf_filtered = yf * k_factor
        v_filtered_total = v_fit_v + np.fft.ifft(yf_filtered).real

        # --- 3. T1, T2 計測 ---
        abs_v_filt = np.abs(v_filtered_total)
        pk_idx = np.argmax(abs_v_filt)
        v_pk = v_filtered_total[pk_idx]
        x30 = np.interp(abs_v_filt[pk_idx]*0.3, abs_v_filt[:pk_idx], t_us[:pk_idx])
        x90 = np.interp(abs_v_filt[pk_idx]*0.9, abs_v_filt[:pk_idx], t_us[:pk_idx])
        x50 = np.interp(abs_v_filt[pk_idx]*0.5, abs_v_filt[pk_idx:][::-1], t_us[pk_idx:][::-1])
        t1 = (x90 - x30) / 0.6
        t0 = x30 - 0.3 * t1
        t2 = x50 - t0

        # --- 4. メインプロット描画 (余白削減・エリア拡大) ---
        main_traces = [
            {"x": safe_list(t_us), "y": safe_list(v_raw_v/1000), "name": "Raw", "line": {"color": "#3498db", "width": 1}},
            {"x": safe_list(t_us), "y": safe_list(v_filtered_total/1000), "name": "Filtered", "line": {"color": "#e67e22", "width": 3}},
            {"x": safe_list(t_us), "y": safe_list(residual_v/2000), "name": "Residual", "line": {"color": "black", "width": 1}},
            {"x": [t0, x30, x90, x50], "y": [0, v_pk*0.3/1000, v_pk*0.9/1000, v_pk*0.5/1000], "mode": "markers", "marker": {"color": "red", "size": 8}, "name": "Points"}
        ]

        shapes = [
            {"type": "line", "x0": t0, "y0": 0, "x1": t0 + t1, "y1": v_pk/1000, "line": {"color": "red", "dash": "dashdot", "width": 1}},
            {"type": "line", "x0": x50, "y0": (v_pk*0.5)/1000, "x1": t0, "y1": (v_pk*0.5)/1000, "line": {"color": "gray", "dash": "dash", "width": 1}},
            {"type": "line", "x0": x50, "y0": (v_pk*0.5)/1000, "x1": x50, "y1": 0, "line": {"color": "gray", "dash": "dot", "width": 1}}
        ]

        main_layout = {
            "template": "plotly_white",
            "height": 600,
            "margin": {"l": 50, "r": 20, "t": 40, "b": 50},
            "xaxis": {"title": "Time [us]", "range": [-10, 100], "autorange": False},
            "yaxis": {"title": "Voltage [kV]", "automargin": True},
            "shapes": shapes,
            "showlegend": True,
            "legend": {"x": 1, "xanchor": "right", "y": 1}
        }

        window.Plotly.newPlot("plot-main", to_js(main_traces), to_js(main_layout))
        
        # --- 5. FFT描画連携 ---
        mask = xf > 0
        window.plotFFTInJS(to_js((xf[mask]/1e6).tolist()), to_js((np.abs(yf[mask])*2/n).tolist()), to_js((np.abs(yf_filtered[mask])*2/n).tolist()), 10.0)
        
        # --- 6. ステータス更新 ---
        fs_mhz = (1.0 / dt_sec) / 1e6
        status_text = (
            f"Completed: Voltage={v_pk/1000:.2f}kV  T1={t1:.2f}us  T2={t2:.2f}us\n"
            f"Sampling Rate: {fs_mhz:.1f}MHz | Fit: a={popt[3]:.3f}, b={popt[1]:.3f}, shift={popt[2]:.1f}, "
        )
        update_status(status_text)
        
    except Exception as e:
        update_status(f"Error: {str(e)}")

document.getElementById("ui-area").style.display = "block"
update_status("READY")
</script>




    
<script>
function plotFFTInJS(freq, rawAmp, filteredAmp, f_limit) {
    // 1. Rawデータのトレース定義 (緑)
    const traceRaw = {
        x: freq,
        y: rawAmp,
        name: 'Raw',
        type: 'scatter',
        mode: 'lines',
        line: { color: '#3498db', width: 1 }
    };

    // 2. Filteredデータのトレース定義 (青)
    const traceFiltered = {
        x: freq,
        y: filteredAmp,
        name: 'Filtered',
        type: 'scatter',
        mode: 'lines',
        line: { color: '#2ecc71', width: 3 }
    };

    // 3. レイアウト設定（横幅最大化 & 凡例内包）
    const layout = {
        template: 'plotly_white',
        margin: { t: 30, r: 20, b: 50, l: 60 },
        autosize: true,
        xaxis: { 
            title: 'Frequency [MHz]', 
            range: [0, 10], // 10MHzに固定
            autorange: false 
        },
        yaxis: { 
            title: 'Amplitude', 
            autorange: true 
        },
        showlegend: true,
        legend: {
            x: 0.99,
            y: 0.99,
            xanchor: 'right',
            yanchor: 'top',
            bgcolor: 'rgba(255, 255, 255, 0.6)',
            bordercolor: '#ccc',
            borderwidth: 1
        }
    };

    const config = { responsive: true };

    // 4. 描画実行（traceRaw と traceFiltered を配列で渡す）
    // もしここで 'traceRaw is not defined' が出る場合は、上の定義より前にこの行を書いていないか確認してください
    Plotly.newPlot('plot-fft', [traceRaw, traceFiltered], layout, config);
}

function sendContactEmailIMPULSE() {
    
    const subject = encodeURIComponent("Inquiry regarding IMPPULSE Test Configuration / インパルス試験構成の相談");
    
    // 3. メール本文の構築 (英語の後に日本語)
    let bodyText = `Inquiry regarding the following IMPULSE Test calculation results:\n`;
    bodyText += `インパルス試験の計算結果に基づき、以下の通り相談いたします。\n\n`;
    bodyText += `Please provide a detailed analysis and review of these parameters.\n`;
    bodyText += `上記内容について、詳細な解析・検討をお願いいたします。\n\n`;
    bodyText += `Synthesis Technologies`;

    const mailtoUrl = `mailto:synthesis.nd1@gmail.com?subject=${subject}&body=${encodeURIComponent(bodyText)}`;
    window.open(mailtoUrl, '_blank');
}
