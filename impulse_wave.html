<style>

<script type="py">
import pandas as pd
import numpy as np
from scipy.optimize import curve_fit
from scipy.fft import fft, fftfreq
from pyscript import window, document, when
import io
import json
import js

status_el = document.getElementById("status")
file_info_el = document.getElementById("file-info")

def update_status(text, animated=False):
    status_el.innerText = text
    if animated: status_el.classList.add("dot-ani")
    else: status_el.classList.remove("dot-ani")

def v_model(t_us, Vm, a, b):
    return Vm * (np.exp(-np.clip(b * t_us, 0, 700)) - np.exp(-np.clip(a * t_us, 0, 700)))

def to_js(obj):
    return window.JSON.parse(json.dumps(obj))

def safe_list(arr):
    return np.nan_to_num(arr, nan=0.0).tolist()

@when("change", "#file-upload")
async def handle_file(event):
    files = event.target.files
    if not files: return
    f = files.item(0)
    file_info_el.innerText = f"選択ファイル: {f.name}"
    update_status("Analyzing...", animated=True)
    
    try:
        buf = await f.arrayBuffer()
        raw_bytes = buf.to_bytes()
        df = pd.read_csv(io.BytesIO(raw_bytes), sep=r'\s+|,', engine='python')
        
        df_clean = df.iloc[:, [0, 1]].apply(pd.to_numeric, errors='coerce').dropna().astype(np.float64)
        
        t_seconds = df_clean.iloc[:, 0].values
        v_raw_v = df_clean.iloc[:, 1].values
        n = len(t_seconds)

        dt_sec = t_seconds[1] - t_seconds[0]
        if dt_sec <= 0:
            dt_sec = (t_seconds[-1] - t_seconds[0]) / (n - 1)
        if dt_sec <= 0: dt_sec = 1e-9

        t_us = t_seconds * 1e6
        window.console.log("FIXED Sampling Rate (Hz):", 1.0 / dt_sec)

        # 1. Fitting
        vm_init = v_raw_v[np.argmax(np.abs(v_raw_v))] * 1.1
        popt, _ = curve_fit(v_model, t_us, v_raw_v, p0=[vm_init, 70.0, 0.4])
        v_fit_v = v_model(t_us, *popt)
        residual_v = v_raw_v - v_fit_v

        # 2. FFT & K-factor & IFFT
        detrended_res = residual_v - np.mean(residual_v)
        yf = fft(detrended_res)
        xf = fftfreq(n, dt_sec)
        
        f_mhz = xf / 1e6
        k_factor = 1.0 / (1.0 + 2.2 * f_mhz**2)
        
        yf_filtered = yf * k_factor
        residual_filtered = np.fft.ifft(yf_filtered).real
        
        # 波形再合成
        v_filtered_total = v_fit_v + residual_filtered

# --- 3. T1, T2 計測ロジック ---
        abs_v_filtered = np.abs(v_filtered_total)
        t_max_idx = np.argmax(abs_v_filtered)
        v_peak = v_filtered_total[t_max_idx]
        v_peak_abs = abs_v_filtered[t_max_idx]
        
        v30_abs, v90_abs, v50_abs = v_peak_abs * 0.3, v_peak_abs * 0.9, v_peak_abs * 0.5

        def get_time_at(target_v_abs, start_idx, end_idx):
            times = t_us[start_idx:end_idx]
            volts_abs = abs_v_filtered[start_idx:end_idx]
            if len(volts_abs) < 2: return 0
            if start_idx >= t_max_idx: # ピーク後の減衰区間用
                return np.interp(target_v_abs, volts_abs[::-1], times[::-1])
            return np.interp(target_v_abs, volts_abs, times)

        # すべての時間軸情報を x 変数に格納
        x30 = get_time_at(v30_abs, 0, t_max_idx)
        x90 = get_time_at(v90_abs, 0, t_max_idx)
        x50 = get_time_at(v50_abs, t_max_idx, len(t_us))
        
        t1 = (x90 - x30) / 0.6
        t0 = x30 - 0.3 * t1
        t2 = x50 - t0

        # --- 4. メインプロット作成 ---
        main_traces = [
            {"x": safe_list(t_us), "y": safe_list(v_raw_v/1000), "name": "Raw", "line": {"color": "#3498db", "width": 1}},
            {"x": safe_list(t_us), "y": safe_list(v_filtered_total/1000), "name": "Filtered (K-factor)", "line": {"color": "#e67e22", "width": 2}},
            {"x": safe_list(t_us), "y": safe_list(residual_filtered/1000), "name": "Residual (Filtered)", "line": {"color": "#27ae60", "width": 1}},
            {
                "x": [t0, x30, x90, x50], 
                "y": [0, v_peak*0.3/1000, v_peak*0.9/1000, v_peak*0.5/1000], 
                "name": "Points", "mode": "markers", "marker": {"color": "red", "size": 8}
            }
        ]

        shapes = [
            # 等価正面直線
            {"type": "line", "x0": t0, "y0": 0, "x1": t0 + t1, "y1": v_peak/1000, "line": {"color": "red", "dash": "dashdot", "width": 1}},
            # T2 水平補助線 (x50点から仮想原点t0まで)
            {"type": "line", "x0": x50, "y0": (v_peak*0.5)/1000, "x1": t0, "y1": (v_peak*0.5)/1000, "line": {"color": "gray", "dash": "dash"}},
            # 【修正】T2 垂直補助線 (x50点から真上の0Vまで)
            {"type": "line", "x0": x50, "y0": (v_peak*0.5)/1000, "x1": x50, "y1": 0, "line": {"color": "gray", "dash": "dot"}}
        ]

        # main_layout を定義
        main_layout = {
            "template": "plotly_white",
            "margin": {"t": 30, "r": 20, "b": 50, "l": 60},
            "xaxis": {"title": "Time [us]", "automargin": True},
            "yaxis": {"title": "Voltage [kV]", "automargin": True},
            "showlegend": True,
            "legend": {"x": 0.99, "y": 0.99, "xanchor": "right", "yanchor": "top"},
            "shapes": shapes
        }

        # プロット実行
        window.Plotly.newPlot("plot-main", to_js(main_traces), to_js(main_layout), to_js({"responsive": True}))# --- 3. T1, T2 計測ロジック ---
        abs_v_filtered = np.abs(v_filtered_total)
        t_max_idx = np.argmax(abs_v_filtered)
        v_peak = v_filtered_total[t_max_idx]
        v_peak_abs = abs_v_filtered[t_max_idx]
        
        v30_abs, v90_abs, v50_abs = v_peak_abs * 0.3, v_peak_abs * 0.9, v_peak_abs * 0.5

        def get_time_at(target_v_abs, start_idx, end_idx):
            times = t_us[start_idx:end_idx]
            volts_abs = abs_v_filtered[start_idx:end_idx]
            if len(volts_abs) < 2: return 0
            if start_idx >= t_max_idx: # ピーク後の減衰区間用
                return np.interp(target_v_abs, volts_abs[::-1], times[::-1])
            return np.interp(target_v_abs, volts_abs, times)

        # すべての時間軸情報を x 変数に格納
        x30 = get_time_at(v30_abs, 0, t_max_idx)
        x90 = get_time_at(v90_abs, 0, t_max_idx)
        x50 = get_time_at(v50_abs, t_max_idx, len(t_us))
        
        t1 = (x90 - x30) / 0.6
        t0 = x30 - 0.3 * t1
        t2 = x50 - t0

        # --- 4. メインプロット作成 ---
        main_traces = [
            {"x": safe_list(t_us), "y": safe_list(v_raw_v/1000), "name": "Raw", "line": {"color": "#3498db", "width": 1}},
            {"x": safe_list(t_us), "y": safe_list(v_filtered_total/1000), "name": "Filtered (K-factor)", "line": {"color": "#e67e22", "width": 2}},
            {"x": safe_list(t_us), "y": safe_list(residual_filtered/1000), "name": "Residual (Filtered)", "line": {"color": "#27ae60", "width": 1}},
            {
                "x": [t0, x30, x90, x50], 
                "y": [0, v_peak*0.3/1000, v_peak*0.9/1000, v_peak*0.5/1000], 
                "name": "Points", "mode": "markers", "marker": {"color": "red", "size": 8}
            }
        ]

        shapes = [
            # 等価正面直線
            {"type": "line", "x0": t0, "y0": 0, "x1": t0 + t1, "y1": v_peak/1000, "line": {"color": "red", "dash": "dashdot", "width": 1}},
            # T2 水平補助線 (x50点から仮想原点t0まで)
            {"type": "line", "x0": x50, "y0": (v_peak*0.5)/1000, "x1": t0, "y1": (v_peak*0.5)/1000, "line": {"color": "gray", "dash": "dash"}},
            # 【修正】T2 垂直補助線 (x50点から真上の0Vまで)
            {"type": "line", "x0": x50, "y0": (v_peak*0.5)/1000, "x1": x50, "y1": 0, "line": {"color": "gray", "dash": "dot"}}
        ]

        # main_layout を定義
        main_layout = {
            "template": "plotly_white",
            "margin": {"t": 30, "r": 20, "b": 50, "l": 60},
            "xaxis": {"title": "Time [us]", "automargin": True},
            "yaxis": {"title": "Voltage [kV]", "automargin": True},
            "showlegend": True,
            "legend": {"x": 0.99, "y": 0.99, "xanchor": "right", "yanchor": "top"},
            "shapes": shapes
        }

        # プロット実行
        window.Plotly.newPlot("plot-main", to_js(main_traces), to_js(main_layout), to_js({"responsive": True}))
        
        # --- 5. FFTプロット ---
        mask = xf > 0
        py_freq = [float(x) / 1e6 for x in xf[mask]]
        py_raw_amp = [float(a) for a in (np.abs(yf[mask]) * 2.0 / n)]
        py_filtered_amp = [float(a) for a in (np.abs(yf_filtered[mask]) * 2.0 / n)]
        window.plotFFTInJS(to_js(py_freq), to_js(py_raw_amp), to_js(py_filtered_amp), 10.0)
        
        window.plotFFTInJS(
            to_js(py_freq), 
            to_js(py_raw_amp), 
            to_js(py_filtered_amp), 
            10.0
        )
    
        # --- 6. ステータス更新 (v_peakを使用して極性を反映) ---
        update_status(f"Completed: Measured Voltage={v_peak/1000:.2f}kV  T1={t1:.2f}us  T2={t2:.2f}us")
        
    except Exception as e:
        update_status(f"Error: {str(e)}")

document.getElementById("ui-area").style.display = "block"
update_status("READY")
</script>




    
<script>
function plotFFTInJS(freq, rawAmp, filteredAmp, f_limit) {
    // 1. Rawデータのトレース定義 (緑)
    const traceRaw = {
        x: freq,
        y: rawAmp,
        name: 'Raw',
        type: 'scatter',
        mode: 'lines',
        line: { color: '#27ae60', width: 1 }
    };

    // 2. Filteredデータのトレース定義 (青)
    const traceFiltered = {
        x: freq,
        y: filteredAmp,
        name: 'Filtered',
        type: 'scatter',
        mode: 'lines',
        line: { color: '#3498db', width: 2 }
    };

    // 3. レイアウト設定（横幅最大化 & 凡例内包）
    const layout = {
        template: 'plotly_white',
        margin: { t: 30, r: 20, b: 50, l: 60 },
        autosize: true,
        xaxis: { 
            title: 'Frequency [MHz]', 
            range: [0, 10], // 10MHzに固定
            autorange: false 
        },
        yaxis: { 
            title: 'Amplitude', 
            autorange: true 
        },
        showlegend: true,
        legend: {
            x: 0.99,
            y: 0.99,
            xanchor: 'right',
            yanchor: 'top',
            bgcolor: 'rgba(255, 255, 255, 0.6)',
            bordercolor: '#ccc',
            borderwidth: 1
        }
    };

    const config = { responsive: true };

    // 4. 描画実行（traceRaw と traceFiltered を配列で渡す）
    // もしここで 'traceRaw is not defined' が出る場合は、上の定義より前にこの行を書いていないか確認してください
    Plotly.newPlot('plot-fft', [traceRaw, traceFiltered], layout, config);
}

function sendContactEmailIMPULSE() {
    
    const subject = encodeURIComponent("Inquiry regarding IMPPULSE Test Configuration / インパルス試験構成の相談");
    
    // 3. メール本文の構築 (英語の後に日本語)
    let bodyText = `Inquiry regarding the following IMPULSE Test calculation results:\n`;
    bodyText += `インパルス試験の計算結果に基づき、以下の通り相談いたします。\n\n`;
    bodyText += `Please provide a detailed analysis and review of these parameters.\n`;
    bodyText += `上記内容について、詳細な解析・検討をお願いいたします。\n\n`;
    bodyText += `Synthesis Technologies`;

    const mailtoUrl = `mailto:synthesis.nd1@gmail.com?subject=${subject}&body=${encodeURIComponent(bodyText)}`;
    window.open(mailtoUrl, '_blank');
}
</script>
